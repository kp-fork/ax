# ---------------------------------------------------------------------------
# Event log storage (PostgreSQL)
#
# Applied by hack/install-ax.sh only when --deploy-postgres is passed. By default
# ax-server connects to an existing Postgres via AX_EVENTLOG_DSN and these
# resources are not deployed. The ax-eventlog-postgres Secret (holding the
# password used below and the DSN) is created by install-ax.sh.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ax-eventlog-postgres
  namespace: ax
  labels:
    app: ax-eventlog-postgres
spec:
  selector:
    app: ax-eventlog-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ax-eventlog-postgres
  namespace: ax
  labels:
    app: ax-eventlog-postgres
spec:
  serviceName: ax-eventlog-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ax-eventlog-postgres
  template:
    metadata:
      labels:
        app: ax-eventlog-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: axeventlog
            - name: POSTGRES_USER
              value: axuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ax-eventlog-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "axuser", "-d", "axeventlog"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
