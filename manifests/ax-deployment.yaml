apiVersion: v1
kind: Namespace
metadata:
  name: ax
---
apiVersion: ate.gke.io/v1alpha1
kind: WorkerPool
metadata:
  name: ax-workerpool
  namespace: ax
spec:
  replicas: 50
  container:
    image: gcr.io/ax-container-images/ax:latest
    ports:
    - containerPort: 8494
---
apiVersion: ate.gke.io/v1alpha1
kind: ActorTemplate
metadata:
  name: ax-template
  namespace: ax
spec:
  workerPoolRef:
    name: ax-workerpool
  snapshotsConfig:
    location:
      bucket: ax-snapshots
      folder: ax

